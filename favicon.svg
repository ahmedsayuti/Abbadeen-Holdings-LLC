<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">

  <!-- White background (solid, no transparency) -->
  <rect width="64" height="64" fill="#ffffff"/>

  <!-- ── Speed lines (left) ── -->
  <rect x="2"  y="20" width="12" height="2.5" rx="1.25" fill="#4D8B31"/>
  <rect x="2"  y="25" width="9"  height="2.5" rx="1.25" fill="#4D8B31"/>
  <rect x="2"  y="30" width="14" height="2.5" rx="1.25" fill="#4D8B31"/>
  <rect x="2"  y="35" width="7"  height="2.5" rx="1.25" fill="#4D8B31"/>

  <!-- ── Trailer body (navy, parallelogram) ── -->
  <!-- Skewed rectangle: left side taller, right side shorter, angled top -->
  <polygon points="16,14  44,14  44,40  16,40" fill="#1B2A47"/>

  <!-- Trailer top angled face (green) — the slanted top of the trailer box -->
  <polygon points="16,14  44,14  48,10  20,10" fill="#4D8B31"/>

  <!-- Trailer right face (darker green, gives depth) -->
  <polygon points="44,14  48,10  48,36  44,40" fill="#3A6A24"/>

  <!-- Trailer green stripe along bottom -->
  <rect x="16" y="36" width="28" height="4" fill="#4D8B31"/>

  <!-- ── Cab (right, navy body) ── -->
  <polygon points="44,20  54,20  57,24  57,40  44,40" fill="#253860"/>

  <!-- Cab green stripe (bottom) -->
  <polygon points="44,36  57,36  57,40  44,40" fill="#4D8B31"/>

  <!-- Cab windshield -->
  <polygon points="46,21  53,21  55,26  46,26" fill="#6BAED6" opacity="0.7"/>

  <!-- Headlight -->
  <rect x="55" y="26" width="3" height="4" rx="1" fill="#FFE066"/>

  <!-- ── Wheels ── -->
  <!-- Rear wheel -->
  <circle cx="26" cy="43" r="7"   fill="#111C30"/>
  <circle cx="26" cy="43" r="4.5" fill="#4D8B31"/>
  <circle cx="26" cy="43" r="2"   fill="#111C30"/>

  <!-- Front wheel -->
  <circle cx="47" cy="43" r="7"   fill="#111C30"/>
  <circle cx="47" cy="43" r="4.5" fill="#4D8B31"/>
  <circle cx="47" cy="43" r="2"   fill="#111C30"/>

  <!-- Ground shadow line -->
  <rect x="14" y="50" width="46" height="2" rx="1" fill="#1B2A47" opacity="0.15"/>

</svg>
